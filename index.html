<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Liberty League Baseball Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #0b1724; color: #f5f7fb; }
    a { color: #8ecbff; text-decoration: none; }
    h1, h2, h3 { margin: 0; }
    .app-shell { display: flex; flex-direction: column; min-height: 100vh; }
    header { background: #111d2e; border-bottom: 1px solid #25324a; padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    header .title-block { display: flex; flex-direction: column; gap: 0.15rem; }
    header .title-main { font-weight: 650; font-size: 1.1rem; letter-spacing: 0.03em; text-transform: uppercase; color: #fefefe; }
    header .title-sub { font-size: 0.8rem; color: #9db0d3; }
    header .meta { font-size: 0.75rem; color: #9db0d3; text-align: right; display: flex; flex-direction: column; gap: 0.15rem; }
    header .meta span.label { color: #64759a; margin-right: 0.25rem; }
    main { flex: 1; display: flex; flex-direction: column; padding: 1rem; gap: 0.75rem; }
    .tabs { display: inline-flex; border-radius: 999px; background: #101b2b; padding: 0.15rem; border: 1px solid #26344b; }
    .tab { padding: 0.45rem 0.95rem; font-size: 0.85rem; border-radius: 999px; cursor: pointer; color: #a7b6d8; border: none; background: transparent; }
    .tab.active { background: linear-gradient(135deg, #2563eb, #22c55e); color: #ffffff; font-weight: 600; box-shadow: 0 0 10px rgba(37,99,235,0.55); }
    .layout { display: grid; grid-template-columns: minmax(0, 1.8fr) minmax(0, 1.2fr); gap: 0.75rem; align-items: stretch; }
    @media (max-width: 960px) { .layout { grid-template-columns: minmax(0, 1fr); } }
    .card { background: #0f1928; border-radius: 0.75rem; border: 1px solid #273552; padding: 0.75rem 0.9rem; box-shadow: 0 18px 40px rgba(0,0,0,0.45); display: flex; flex-direction: column; gap: 0.75rem; }
    .card-header { display: flex; justify-content: space-between; align-items: baseline; gap: 0.25rem; }
    .card-title { font-size: 0.9rem; font-weight: 600; color: #e6ecff; display: inline-flex; align-items: center; gap: 0.35rem; }
    .pill { border-radius: 999px; padding: 0.1rem 0.55rem; font-size: 0.7rem; border: 1px solid #334569; color: #9fb4dd; background: rgba(15,23,42,0.8); }
    .card-subtitle { font-size: 0.75rem; color: #8093b8; }
    .controls-row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .control-group { display: flex; flex-direction: column; gap: 0.15rem; min-width: 140px; }
    .control-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #7f92b5; }
    select, input[type="search"] { background: #0b1625; border-radius: 999px; border: 1px solid #334569; color: #e5edff; padding: 0.3rem 0.7rem; font-size: 0.8rem; min-height: 30px; }
    select:focus, input[type="search"]:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px rgba(59,130,246,0.5); }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    thead { background: #101b30; }
    th, td { padding: 0.3rem 0.4rem; text-align: right; white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; }
    th { font-weight: 500; color: #9fb4dd; cursor: pointer; border-bottom: 1px solid #1f3050; position: sticky; top: 0; background: #101b30; z-index: 2; }
    td { border-bottom: 1px solid #172338; color: #d5e2ff; }
    tr:nth-child(even) td { background: rgba(15,23,42,0.45); }
    tr:hover td { background: rgba(37, 99, 235, 0.18); }
