<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Liberty League Baseball Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #0b1724; color: #f5f7fb; }
    a { color: #8ecbff; text-decoration: none; }

    header { background: #111d2e; border-bottom: 1px solid #25324a; padding: 14px 18px; }
    .title { font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .sub { color: #9fb4dd; font-size: 12px; margin-top: 4px; }

    main { padding: 16px 18px; max-width: 1200px; margin: 0 auto; }
    .panel { background: rgba(17,29,46,0.65); border: 1px solid #25324a; border-radius: 14px; padding: 14px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 999px; background: #0b1625; border: 1px solid #334569; color: #e5edff; font-size: 13px; }
    .status { margin-top: 12px; color: #d5e2ff; font-size: 14px; white-space: pre-wrap; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
    thead { background: #101b30; }
    th, td { padding: 8px 10px; text-align: right; white-space: nowrap; border-bottom: 1px solid #172338; }
    th:first-child, td:first-child { text-align: left; }
    th { color: #9fb4dd; font-weight: 600; position: sticky; top: 0; background: #101b30; }
    tbody tr:nth-child(even) td { background: rgba(15,23,42,0.45); }
    tbody tr:hover td { background: rgba(37, 99, 235, 0.18); }

    code { color: #8ecbff; }
  </style>
</head>

<body>
  <header>
    <div class="title">Liberty League Baseball Dashboard</div>
    <div class="sub">Auto-updated via GitHub Actions + Netlify</div>
  </header>

  <main>
    <div class="panel">
      <div class="row">
        <div class="pill">State: <strong id="dataState">Loading…</strong></div>
        <div class="pill">Last generated: <strong id="generatedAt">—</strong></div>
      </div>

      <div id="status" class="status"></div>
