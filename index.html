<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Liberty League – Players</title>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #050816; color: #e5e7eb; }
    header { padding: 16px 18px; border-bottom: 1px solid #202234; background: #050816; position: sticky; top: 0; z-index: 10; }
    h1 { margin: 0; font-size: 18px; font-weight: 800; color: #f9fafb; }
    .sub { margin-top: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 13px; color: #9ca3af; }
    .pill { padding: 4px 10px; border-radius: 999px; background: #111827; color: #e5e7eb; font-weight: 700; }

    main { padding: 16px 18px 32px; max-width: 1120px; margin: 0 auto; }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) 120px 220px 200px;
      gap: 12px;
      align-items: end;
      background: #020617;
      border-radius: 18px;
      padding: 16px 18px 14px;
      border: 1px solid #111827;
    }

    label { display: block; font-size: 11px; letter-spacing: .03em; text-transform: uppercase; color: #9ca3af; margin-bottom: 6px; font-weight: 800; }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #111827;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
    }

    input[type="range"] { width: 100%; }

    .btnrow { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }

    button {
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid #111827;
      background: #f9fafb;
      cursor: pointer;
      font-weight: 900;
      font-size: 13px;
      color: #0b1020;
    }

    button.secondary {
      background: #020617;
      color: #e5e7eb;
    }

    #playersGrid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      border-radius: 18px;
      border: 1px solid #111827;
      background: radial-gradient(circle at 0 0, #111827 0, #020617 45%, #020617 100%);
      padding: 12px 13px;
      color: #e5e7eb;
    }

    .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .card-name { font-size: 15px; font-weight: 900; }
    .card-sub { font-size: 12px; color: #9ca3af; margin-top: 2px; font-weight: 700; }

    .btn-pin {
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-pin.pinned { background: #f97316; border-color: #f97316; color: #020617; }

    .card-body {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric {
      padding: 7px 9px;
      border-radius: 999px;
      border: 1px solid #111827;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
    }
    .metric .label { color: #9ca3af; text-transform: uppercase; letter-spacing: .04em; font-size: 10px; font-weight: 800; }
    .metric .value { font-weight: 900; }

    .error {
      border-radius: 12px;
      border: 1px solid #fca5a5;
      background: #7f1d1d;
      color: #fee2e2;
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 14px;
    }

    @media (max-width: 900px) {
      .controls { grid-template-columns: 1fr 1fr; }
    }
  </style>

  <!-- IMPORTANT: absolute path so this works when the page is /players/ -->
  <script src="/players.js" defer></script>
</head>

<body>
  <header>
    <h1>Liberty League – Players</h1>
    <div class="sub">
      <span id="state" class="pill">Loading</span>
      <span>Last generated <span id="lastGenerated">-</span></span>
      <span class="pill">Count <span id="countPill">0</span></span>
    </div>
  </header>

  <main>
    <div class="controls">
      <div>
        <label for="q">Search player</label>
        <input id="q" type="text" placeholder="Type a name or team…" />
      </div>

      <div>
        <label for="minAB">Min AB</label>
        <input id="minAB" type="number" min="0" step="1" value="0" />
      </div>

      <div>
        <label for="minPaPct">Min PA percentile <span id="paPctLabel">0%</span></label>
        <input id="minPaPct" type="range" min="0" max="100" step="1" value="0" />
      </div>

      <div>
        <label for="sortBy">Sort by</label>
        <select id="sortBy">
          <option value="ops" selected>OPS</option>
          <option value="ab">AB</option>
          <option value="pa">PA</option>
          <option value="name">Name</option>
          <option value="team">Team</option>
        </select>
      </div>
    </div>

    <div class="btnrow">
      <button id="exportBtn">Export filtered CSV</button>
      <button id="clearPinsBtn" class="secondary">Clear pins</button>
      <button id="clearAllBtn" class="secondary">Clear all</button>
    </div>

    <section id="playersGrid"></section>
  </main>
</body>
</html>
