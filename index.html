<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liberty League - Teams</title>

    <!-- CSS + JS for this page -->
    <link rel="stylesheet" href="./index.css" />
    <script defer src="./index.js"></script>
  </head>

  <body>
    <div class="top">
      <div class="nav">
        <strong>Teams table</strong>
        <span class="sep">|</span>
        <a href="/cards">Team cards</a>
      </div>

      <div class="meta">
        <span id="state" class="pill">Loading...</span>
        <span class="muted">
          Last generated <span id="lastGenerated"></span>
        </span>
      </div>
    </div>

    <div class="hero">
      <div class="heroTitle">Liberty League</div>
      <div class="heroSub">
        Search, sort, and click a team to jump to its card.
      </div>
    </div>

    <div class="controls">
      <input id="search" placeholder="Search team" />
      <select id="sort"></select>
      <span id="count"></span>
    </div>

<div class="main">
  <div class="panel">
  </div>
</div>
</body>
</html>
