<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liberty League - Team Cards</title>
    <link rel="stylesheet" href="cards.css" />
  </head>

  <body>
    <div class="top">
      <div class="nav">
        <a href="./index.html">Teams table</a>
        <span class="sep">|</span>
        <strong>Team cards</strong>
      </div>

      <div class="meta">
        <span id="state" class="pill">Loading...</span>
        <span class="muted">Last generated <span id="lastGenerated"></span></span>
      </div>
    </div>

    <div class="controls">
      <input id="search" placeholder="Search team" />
      <label class="muted">Sort</label>
      <select id="sortBy">
        <option value="era">ERA low</option>
        <option value="so">SO high</option>
        <option value="bb">BB low</option>
        <option value="ip">IP high</option>
        <option value="w">Wins high</option>
      </select>
      <span id="count" class="count"></span>
    </div>

    <div class="layout">
      <div id="grid" class="grid"></div>
      <div id="side" class="side">Click a card to see details.</div>
    </div>

    <script src="cards.js"></script>
  </body>
</html>
