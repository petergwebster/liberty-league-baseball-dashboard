<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liberty League - Cards</title>
    <link rel="stylesheet" href="./cards.css" />
    <script defer src="./cards.js"></script>
  </head>

  <body>
    <div class="top">
      <div class="nav">
        <a href="/">Teams table</a>
        <span class="sep">|</span>
        <strong>Team cards</strong>
      </div>
      <div class="meta">
        <span id="state" class="pill">Loading...</span>
        <span class="muted">Last generated <span id="lastGenerated"></span></span>
      </div>
    </div>

    <div class="controls">
      <input id="search" placeholder="Search team" />
      <select id="sort"></select>
      <span id="count"></span>
    </div>

    <div class="layout">
      <div id="grid" class="grid"></div>
      <div id="side" class="side"></div>
    </div>
  </body>
</html>
