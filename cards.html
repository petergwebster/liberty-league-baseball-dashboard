<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liberty League - Team Cards</title>
    <link rel="stylesheet" href="cards.css" />
  </head>

  <body>
    <div class="top">
      <div class="nav">
        <a href="./index.html">Teams table</a>
        <span class="sep">|</span>
        <strong>Team cards</strong>
      </div>

      <div class="meta">
        <span id="state" class="pill">Loading...</span>
        <span class="muted">Last generated <span id="lastGenerated"></span></span>
      </div>
    </div>

    <div class="controls">
      <input id="search" placeholder="Search team" />
      <select id="sort"></select>
      <span id="count"></span>
    </div>

    <div class="layout">
      <div id="grid"></div>
      <div id="side"></div>
    </div>

    <script defer src="cards.js"></script>
  </body>
</html>
