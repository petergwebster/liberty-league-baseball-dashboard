name: Update Liberty League stats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-stats-main
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Network sanity check
        run: |
          echo DNS
          nslookup libertyleagueconference.com || true
          echo HTTP
          curl -I -L https://libertyleagueconference.com/sports/bsb/scoreboard || true

      - name: Run scraper / generator
        run: |
          # IMPORTANT: replace this with the command your repo uses to generate live_team_stats.json
          # Examples:
          # python build_live_stats.py
          # python scrape.py
          python build_live_stats.py

      - name: Commit and push changes (robust)
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the file(s) you expect to change
          git add live_team_stats.json

          # If nothing changed, exit cleanly
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update live stats"

          # Sync with latest main to avoid 'fetch first' rejection
          git pull --rebase origin main

          # Push our commit
          git push origin HEAD:main
