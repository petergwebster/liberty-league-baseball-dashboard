name: Update Liberty League stats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-stats-main
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install playwright

      - name: Install Playwright browsers and OS deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Network sanity check
        run: |
          echo DNS
          nslookup libertyleagueconference.com || true
          echo HTTP
          curl -I -L https://libertyleagueconference.com/sports/bsb/scoreboard || true

      - name: Run scraper / generator
        run: |
          python build_live_stats.py

      - name: Commit and push live_team_stats.json
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Make the working directory exactly match the remote branch
          # (prevents "unstaged changes" / rebase issues entirely)
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

          # Re-run scraper after clean reset so the generated JSON is present
          python build_live_stats.py

          # Commit only the JSON file we want tracked
          git add live_team_stats.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update live stats"
          git push origin HEAD:main
