name: Update stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # every hour; adjust if you want

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # (Optional) if you still use build_live_stats.py for players / glossary
      - name: Build other stats (players, glossary, etc.)
        run: |
          python build_live_stats.py

      # THIS is the new bit that generates live_team_stats.json
      - name: Generate live team stats JSON
        run: |
          python generate_live_team_stats.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live_team_stats.json live_players.json stats_glossary.json || true
          git commit -m "Update live stats JSON" || echo "No changes to commit"
          git push
